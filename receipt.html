<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Receipt - Miss A Crafts</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, serif;
}

body{
min-height:100vh;
padding:30px;
background:linear-gradient(135deg,#eabcbc,#f7d6d6,#c9d6ff);
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("images/logo.png");
background-size:140px;
opacity:.12;
pointer-events:none;
}

.container{
max-width:750px;
margin:auto;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);
padding:25px;
border-radius:18px;
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
margin-bottom:20px;
color:#555;
}

.info{
line-height:1.8;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid rgba(0,0,0,0.2);
padding:8px;
text-align:center;
background:rgba(255,255,255,0.7);
}

th{
background:#ff7d7d;
color:white;
}

.total{
margin-top:15px;
font-weight:bold;
line-height:1.8;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.home-btn{
background:#ff7676;
color:white;
}

.print-btn{
background:#3a74ff;
color:white;
}

@media print {
button{
display:none;
}
body{
background:white;
}
body::before{
display:none;
}
}
</style>
</head>

<body>

<div class="container">

<h1>🧾 Miss A Crafts & Stuffs</h1>
<p class="subtitle">Official Receipt / Invoice</p>

<center><p>Thank you for ordering with us!</p></center>

<div id="info" class="info"></div>

<table>
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="items"></tbody>
</table>

<div id="summary" class="total"></div>

<div class="button">
<button class="home-btn" onclick="goHome()">🏠 Back to Home</button>
</div>

</div>

<script>
const order = JSON.parse(localStorage.getItem("lastOrder"));

if (!order) {
document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>No receipt found</h2>";
}

function safe(val){
return val ? val : "-";
}

/* INFO (NO STATUS FOR CUSTOMER) */
document.getElementById("info").innerHTML = `
<b>Order ID:</b> ${safe(order.id)}<br>
<b>Name:</b> ${safe(order.name)}<br>
<b>Phone:</b> ${safe(order.phone)}<br>
<b>Address:</b> ${safe(order.address)}<br>
<b>Location:</b> ${safe(order.location)}<br>
<b>Payment Method:</b> ${safe(order.payment_method)}<br>
<b>Date:</b> ${order.timestamp ? new Date(order.timestamp).toLocaleString() : "-"}
`;

/* ITEMS */
let html = "";

if (Array.isArray(order.items)) {
order.items.forEach(item => {
let qty = item.quantity || 1;
let total = (item.price || 0) * qty;

html += `
<tr>
<td>${safe(item.name)}</td>
<td>${qty}</td>
<td>₱${item.price || 0}</td>
<td>₱${total}</td>
</tr>
`;
});
}

document.getElementById("items").innerHTML = html;

/* SUMMARY */
document.getElementById("summary").innerHTML = `
Subtotal: ₱${order.subtotal || 0}<br>
Shipping: ₱${order.shipping || 0}<br>
Grand Total: ₱${order.total_price || 0}
`;

/* HOME */
function goHome(){
window.location.href = "index.html";
}
</script>

</body>
</html>
