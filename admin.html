<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Miss A | Crafts and Stuffs</title>

<link rel="icon" href="images/logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,sans-serif;
}

body{
padding:30px;
min-height:100vh;
background:linear-gradient(135deg,#eabcbc,#f7d6d6,#c9d6ff);
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("images/logo.png");
background-size:140px;
opacity:.15;
pointer-events:none;
}

.header-row{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.dashboard-header{display:flex;gap:25px;align-items:center;}
.logo{width:180px;}
h1{font-size:48px;}
h2{font-weight:normal;color:#666;}

.logout-btn{
padding:14px 24px;
background:#ee9c9c;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-left:8px;
}

.summary{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.35);
padding:25px;
border-radius:18px;
text-align:center;
backdrop-filter:blur(10px);
}

.card p{
font-size:34px;
color:#ff6c6c;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
border-radius:18px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(12px);
overflow-x:auto;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:14px;text-align:center;}

th{background:#ff7d7d;color:white;}
td{background:rgba(255,255,255,.7);}

.customer{text-align:left;line-height:1.6;}

.status{
padding:6px 12px;
border-radius:999px;
color:white;
font-weight:bold;
display:inline-block;
}

.pending{background:#ff9800;}
.progress{background:#9c27b0;}
.delivered{background:#3a74ff;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin:3px;
}

.progress-btn{background:#9c27b0;}
.delivered-btn{background:#3a74ff;}
.delete-btn{background:#e15757;}
</style>
</head>

<body>

<div class="header-row">
<div class="dashboard-header">
<img src="images/logo.png" class="logo">
<div>
<h1>Miss A Crafts</h1>
<h2>Admin Panel</h2>
</div>
</div>

<div>
<button class="logout-btn" onclick="exportPDF()">Export PDF</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
</div>

<div class="summary">
<div class="card"><h3>Total Orders</h3><p id="totalOrders">0</p></div>
<div class="card"><h3>Revenue</h3><p id="revenue">₱0</p></div>
<div class="card"><h3>Today</h3><p id="todayOrders">0</p></div>
</div>

<div class="container">
<table>
<thead>
<tr>
<th>ID</th>
<th>Customer</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="ordersTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyARANfVLvrWtOpr-oSKm1x5QxnVPLOx3fA",
authDomain: "missa-crafts-and-stuffs-orders.firebaseapp.com",
projectId: "missa-crafts-and-stuffs-orders",
storageBucket: "missa-crafts-and-stuffs-orders.firebasestorage.app",
messagingSenderId: "307234784231",
appId: "1:307234784231:web:c332e48e8f76ae35b1b342"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let orders = [];

async function getOrders(){
const snap = await getDocs(collection(db,"orders"));
orders = [];
snap.forEach(d=>{
orders.push({id:d.id,...d.data()});
});
}

function formatDate(ts){
if(!ts) return "-";
const d = new Date(ts);
if(isNaN(d)) return ts;
return d.toLocaleString("en-PH",{timeZone:"Asia/Manila"});
}

async function render(){
await getOrders();

const table = document.getElementById("ordersTable");
table.innerHTML="";

let revenue=0;
let today=0;

const now = new Date().toDateString();

orders.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));

orders.forEach((o,i)=>{
const total=o.total_price||0;
revenue+=total;

if(o.timestamp && new Date(o.timestamp).toDateString()===now) today++;

let status=o.status||"Pending";
let cls=status==="Delivered"?"delivered":status==="In Progress"?"progress":"pending";

table.innerHTML+=`
<tr>
<td>${o.id||"-"}</td>

<td class="customer">
<b>${o.name||"-"}</b><br>
${o.phone||""}<br>
${o.address||""}
</td>

<td>
${Array.isArray(o.items)?o.items.map(it=>
`${it.name} (x${it.quantity||1})<br>`
).join(""):"-"}
</td>

<td>₱${total}</td>

<td><span class="${cls} status">${status}</span></td>

<td>${formatDate(o.timestamp)}</td>

<td>
<button class="progress-btn" onclick="setStatus('${o.id}','In Progress')">Progress</button>
<button class="delivered-btn" onclick="setStatus('${o.id}','Delivered')">Done</button>
<button class="delete-btn" onclick="del('${o.id}')">Delete</button>
</td>
</tr>`;
});

document.getElementById("totalOrders").innerText=orders.length;
document.getElementById("revenue").innerText="₱"+revenue;
document.getElementById("todayOrders").innerText=today;
}

async function setStatus(id,status){
await updateDoc(doc(db,"orders",id),{status});
render();
}

async function del(id){
await deleteDoc(doc(db,"orders",id));
render();
}

/* PDF LANDSCAPE FIX */
function exportPDF(){
html2pdf().set({
margin:0.3,
filename:"orders.pdf",
html2canvas:{scale:2},
jsPDF:{format:"a4",orientation:"landscape"}
}).from(document.querySelector(".container")).save();
}

function logout(){
localStorage.removeItem("isAdminLoggedIn");
window.location.href="admin-login.html";
}

window.exportPDF=exportPDF;
window.logout=logout;
window.setStatus=setStatus;
window.del=del;

render();
</script>

</body>
</html>
