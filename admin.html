<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Miss A | Crafts and Stuffs
</title>

<link rel="icon" href="images/logo.png">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* ======================
BASE STYLE
====================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,sans-serif;
}

body{
padding:30px;
min-height:100vh;

background:
linear-gradient(
135deg,
#eabcbc,
#f7d6d6,
#c9d6ff
);

overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("images/logo.png");
background-size:140px;
opacity:.15;
pointer-events:none;
}

.header-row{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.dashboard-header{
display:flex;
align-items:center;
gap:25px;
}

.logo{
width:180px;
}

h1{font-size:48px;}
h2{font-weight:normal;color:#666;}

.logout-btn{
padding:14px 24px;
background:#ee9c9c;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-left:8px;
}

.summary{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.35);
padding:25px;
border-radius:18px;
text-align:center;
backdrop-filter:blur(10px);
}

.card p{
font-size:34px;
color:#ff6c6c;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
border-radius:18px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(12px);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
text-align:center;
}

th{
background:#ff7d7d;
color:white;
}

td{
background:rgba(255,255,255,.7);
}

.customer{
text-align:left;
line-height:1.8;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:999px;
color:white;
font-weight:bold;
}

.pending{background:#ff9800;}
.progress{background:#9c27b0;}
.delivered{background:#3a74ff;}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
margin:4px;
color:white;
}

.progress-btn{background:#9c27b0;}
.delivered-btn{background:#3a74ff;}
.delete-btn{background:#e15757;}

.custom-order{
background:#fff0f6;
padding:12px;
border-radius:12px;
border:2px dashed #ff8aac;
}

.empty{padding:30px;}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header-row">

<div class="dashboard-header">
<img src="images/logo.png" class="logo">

<div>
<h1>Miss A Crafts and Stuffs</h1>
<h2>Official Admin Panel</h2>
</div>

</div>

<!-- BUTTONS -->
<div>

<button class="logout-btn" onclick="exportPDF()">
Export PDF
</button>

<button class="logout-btn" onclick="resetOrders()">
Reset Orders
</button>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

</div>

<!-- SUMMARY -->
<div class="summary">

<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p id="revenue">₱0</p>
</div>

<div class="card">
<h3>Today's Orders</h3>
<p id="todayOrders">0</p>
</div>

</div>

<!-- TABLE -->
<div class="container">

<table>
<thead>
<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

<script>

/* ======================
AUTH
====================== */

if(localStorage.getItem("isAdminLoggedIn") !== "true"){
  window.location.href = "admin-login.html";
}

function logout(){
  localStorage.removeItem("isAdminLoggedIn");
  window.location.href = "admin-login.html";
}

/* ======================
DATA
====================== */

function getOrders(){
  return JSON.parse(localStorage.getItem("orders")) || [];
}

function saveOrders(orders){
  localStorage.setItem("orders", JSON.stringify(orders));
  renderOrders();
}

/* ======================
VIEW ORDER (FIXED)
====================== */

function viewOrder(index){

  let orders = getOrders();
  let order = orders[index];

  let itemsText = "";

  if(order.type === "custom"){
    itemsText = `
      <div class="custom-order">
        <b>✨ CUSTOM ORDER</b><br><br>
        ${order.description || "-"}
      </div>
    `;
  }
  else if(Array.isArray(order.items)){
    itemsText = order.items.map(i =>
      `• ${i.name || i.product} (x${i.qty || 1})`
    ).join("<br>");
  }
  else{
    itemsText = order.product || "-";
  }

  const price = order.final_price || order.total_price || 0;

  const modal = `
    <div id="orderModal" style="
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    ">
      <div style="
        background:white;
        padding:20px;
        border-radius:12px;
        width:500px;
        max-height:80vh;
        overflow:auto;
        position:relative;
      ">

        <span onclick="document.getElementById('orderModal').remove()"
          style="position:absolute;right:15px;top:10px;font-size:22px;cursor:pointer;">
          ✖
        </span>

        <h2>Order Details</h2>
        <hr><br>

        <p><b>ID:</b> ${order.id || "-"}</p>
        <p><b>Name:</b> ${order.name || "-"}</p>
        <p><b>Phone:</b> ${order.phone || "-"}</p>
        <p><b>Address:</b> ${order.address || "-"}</p>

        <br>

        <p><b>Status:</b> ${order.status || "Pending"}</p>
        <p><b>Total:</b> ₱${price}</p>

        <br>

        <h3>Items</h3>
        <p>${itemsText}</p>

      </div>
    </div>
  `;

  document.body.insertAdjacentHTML("beforeend", modal);
}

/* ======================
EXPORT PDF
====================== */

function exportPDF() {

  const orders = getOrders();

  if (orders.length === 0) {
    alert("No orders to export.");
    return;
  }

  let html = `
    <h2 style="text-align:center;">Orders Report</h2>
    <p style="text-align:center;">Generated: ${new Date().toLocaleString()}</p>
    <br>

    <table border="1" style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr style="background:#ff7d7d;color:white;">
          <th>ID</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
  `;

  orders.forEach(order => {

    let items = "";

    if(order.type === "custom"){
      items = order.description || "Custom Order";
    } else if(Array.isArray(order.items)){
      items = order.items.map(i =>
        `${i.name || i.product} (x${i.qty || 1})`
      ).join(", ");
    } else {
      items = order.product || "-";
    }

    html += `
      <tr>
        <td>${order.id || "-"}</td>
        <td>${order.name || "-"}</td>
        <td>${order.phone || "-"}</td>
        <td>${order.address || "-"}</td>
        <td>${items}</td>
        <td>₱${order.final_price || order.total_price || 0}</td>
        <td>${order.status || "Pending"}</td>
        <td>${order.date || "-"}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  const container = document.createElement("div");
  container.innerHTML = html;
  document.body.appendChild(container);

  html2pdf().set({
    margin: 0.3,
    filename: "orders_report.pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { format: "a4", orientation: "landscape" }
  }).from(container).save().then(() => {
    document.body.removeChild(container);
  });
}

/* ======================
RESET ORDERS
====================== */

function resetOrders(){

  if(!confirm("⚠️ Delete ALL orders?")) return;
  if(!confirm("Are you REALLY sure? This cannot be undone.")) return;

  localStorage.removeItem("orders");
  alert("All orders deleted!");
  renderOrders();
}

/* ======================
ORDER ACTIONS
====================== */

function markProgress(index){
  let orders = getOrders();
  orders[index].status = "In Progress";
  saveOrders(orders);
}

function deliverOrder(index){
  let orders = getOrders();
  orders[index].status = "Delivered";
  saveOrders(orders);
}

function deleteOrder(index){
  if(!confirm("Delete this order?")) return;
  let orders = getOrders();
  orders.splice(index,1);
  saveOrders(orders);
}

/* ======================
RENDER
====================== */

function renderOrders(){

  const table = document.getElementById("ordersTable");
  const orders = getOrders();

  table.innerHTML = "";

  let revenue = 0;
  let today = 0;

  const now = new Date().toDateString();

  if(orders.length === 0){
    table.innerHTML = `<tr><td colspan="7" class="empty">No orders yet</td></tr>`;
    document.getElementById("totalOrders").innerText = 0;
    document.getElementById("revenue").innerText = "₱0";
    document.getElementById("todayOrders").innerText = 0;
    return;
  }

  orders.slice().reverse().forEach((order,r)=>{

    const index = orders.length - 1 - r;

    let status = order.status || "Pending";

    let cls = "pending";
    if(status === "In Progress") cls = "progress";
    if(status === "Delivered") cls = "delivered";

    let total = order.final_price || order.total_price || 0;
    revenue += Number(total);

    if(order.date && new Date(order.date).toDateString() === now){
      today++;
    }

    let items = "";

    if(order.type === "custom"){
      items = `<div class="custom-order">✨ CUSTOM ORDER<br><br>${order.description || "-"}</div>`;
    } else if(Array.isArray(order.items)){
      items = order.items.map(i =>
        `${i.name || i.product} (x${i.qty || 1})`
      ).join("<br>");
    } else {
      items = order.product || "-";
    }

    table.innerHTML += `
      <tr>
        <td>${order.id || "-"}</td>
        <td class="customer">
          <b>${order.name || "-"}</b><br>
          ${order.phone || "-"}<br>
          ${order.address || "-"}
        </td>
        <td>${items}</td>
        <td>₱${total}</td>
        <td><span class="status ${cls}">${status}</span></td>
        <td>${order.date || "-"}</td>
        <td>
          <button class="progress-btn" onclick="markProgress(${index})">In Progress</button><br>
          <button class="delivered-btn" onclick="deliverOrder(${index})">Delivered</button><br>
          <button class="progress-btn" onclick="viewOrder(${index})">View</button><br>
          <button class="delete-btn" onclick="deleteOrder(${index})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("totalOrders").innerText = orders.length;
  document.getElementById("revenue").innerText = "₱" + revenue;
  document.getElementById("todayOrders").innerText = today;
}

renderOrders();
setInterval(renderOrders,2000);

</script>

</body>
</html>
