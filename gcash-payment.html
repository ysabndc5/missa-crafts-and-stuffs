<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>GCash Payment</title>

<link rel="icon" href="images/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{

min-height:100vh;

padding:30px;

background:
linear-gradient(
135deg,
#eabcbc,
#f7d6d6,
#c9d6ff
);

}

body::before{

content:"";

position:fixed;

inset:0;

background:
url("images/logo.png");

background-size:140px;

opacity:.12;

pointer-events:none;

}

.box{

max-width:600px;

margin:auto;

background:
rgba(
255,
255,
255,
.25
);

backdrop-filter:
blur(12px);

padding:35px;

border-radius:22px;

text-align:center;

}

img{

width:260px;

border-radius:18px;

margin-top:20px;

}

.notice{

margin-top:20px;

line-height:1.8;

}

input{

width:100%;

padding:14px;

margin-top:20px;

border:none;

border-radius:12px;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

}

.pay{

background:#4CAF50;

color:white;

}

.back{

background:#999;

color:white;

}

#success{

display:none;

margin-top:20px;

padding:15px;

background:white;

border-radius:12px;

}

</style>

</head>

<body>

<div class="box">

<h1>
💳 GCash Payment
</h1>

<p class="notice">

Scan QR first and complete payment before submitting.

</p>

<img
src="images/gcash-qr.png"
>

<div class="notice">

</div>

<input
type="file"
id="proof"
accept="image/*"
>

<button
class="pay"
onclick="submitPayment()"
>

I Already Paid

</button>

<button
class="back"
onclick="goBack()"
>

Back to Cart

</button>

<div id="success">

🎉 Payment submitted successfully.

<br><br>

Waiting for admin approval.

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyARANf...",

authDomain:
"missa-crafts-and-stuffs-orders.firebaseapp.com",

projectId:
"missa-crafts-and-stuffs-orders"

};

const app=
initializeApp(
firebaseConfig
);

const db=
getFirestore(
app
);

/* CREATE MESSAGE */
function showMessage(text){

let box=
document.getElementById(
"success"
);

box.innerHTML=text;

box.style.display=
"block";

}

/* SUBMIT */

async function submitPayment(){

const file=
document
.getElementById(
"proof"
)
.files[0];

/* NO ALERT */

if(!file){

showMessage(
"📌 Please upload your payment proof before clicking <b>I Already Paid</b>."
);

return;

}

let order=
JSON.parse(
localStorage.getItem(
"pendingOrder"
)
);

/* NO ALERT */

if(!order){

showMessage(
"⚠ No pending order found."
);

return;

}

/* SAVE */

order.payment_method=
"GCash";

order.payment_proof=
file.name;

order.status=
"Waiting Payment Approval";

order.payment_submitted=
new Date()
.toISOString();

/* FIRESTORE */

await addDoc(

collection(
db,
"orders"
),

order

);

/* SAVE RECEIPT */

localStorage.setItem(

"lastOrder",

JSON.stringify(
order
)

);

localStorage.removeItem(
"pendingOrder"
);

localStorage.removeItem(
"cart"
);

/* THANK YOU */

showMessage(`

🎉 Payment submitted successfully.

<br><br>

Waiting for admin approval.

`);

setTimeout(()=>{

window.location.href=
"receipt.html";

},2500);

}

/* BACK */

function goBack(){

window.location.href=
"cart.html";

}

window.submitPayment=
submitPayment;

window.goBack=
goBack;

</script>

</body>

</html>
