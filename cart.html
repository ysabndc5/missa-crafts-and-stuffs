<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miss A | Crafts and Stuffs</title>

<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<a href="index.html" class="dashboard-btn">
🏠 Dashboard
</a>

<div class="checkout-container">

<div class="cart-section">

<h1><i>Checkout Cart 🛒</i></h1>

<div id="cart-items"></div>

</div>

<div class="summary-section">

<h2>🧾 Order Summary</h2>

<div class="summary-box">

<div class="row">
<span>Items</span>
<span id="subtotal">₱0</span>
</div>

<div class="row">
<span>Shipping</span>
<span id="shipping">₱0</span>
</div>

<hr>

<div class="row total">
<span>Total</span>
<span id="grand-total">₱0</span>
</div>

</div>

<h2>🧍 Customer Information</h2>

<form>

<input
type="text"
id="customerName"
placeholder="Full Name"
required
>

<select id="location" required>

<option value="">
Select Province / Area
</option>

<option>San Antonio</option>
<option>San Lorenzo</option>
<option>Balas</option>
<option>Bulacan</option>
<option>Tarlac</option>
<option>Bataan</option>
<option>Metro Manila</option>
<option>Laguna</option>
<option>Cavite</option>
<option>Others</option>

</select>

<input
type="text"
id="customerAddress"
placeholder="Address"
required
>

<input
type="tel"
id="customerPhone"
placeholder="Phone"
required
>

<button
type="button"
onclick="checkout()"
>

Place Order

</button>

</form>

</div>

</div>

<!-- SUCCESS MODAL -->

<div
id="successModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:9999;
">

<div
style="
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
">

<h2>
🎉 Order Received!
</h2>

<p>

Thank you for your order.
We will contact you for delivery.

</p>

</div>

</div>

<script type="module">

import {
initializeApp
}

from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}

from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyARANf...",

authDomain:
"missa-crafts-and-stuffs-orders.firebaseapp.com",

projectId:
"missa-crafts-and-stuffs-orders",

storageBucket:
"missa-crafts-and-stuffs-orders.firebasestorage.app",

messagingSenderId:
"307234784231",

appId:
"1:307234784231:web:c332e48e8f76ae35b1b342"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

/* CART */

let cart=
JSON.parse(
localStorage.getItem("cart")
)||[];

/* COD */

const codAreas=[
"San Antonio",
"San Lorenzo",
"Balas"
];

/* SHIPPING */

function getShipping(location){

switch(location){

case "San Antonio":
case "San Lorenzo":
case "Balas":
return 0;

case "Mexico, Pampanga":
return 5;

case "Pampanga":
return 10;

case "Bulacan":
return 50;

case "Tarlac":
return 50;

case "Bataan":
return 60;

case "Metro Manila":
return 80;

case "Laguna":
return 100;

case "Cavite":
return 100;

default:
return 150;

}

}

/* SAVE */

function save(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

/* RENDER */

function renderCart(){

const c=
document.getElementById(
"cart-items"
);

c.innerHTML="";

if(cart.length===0){

c.innerHTML=
"<p>Your cart is empty.</p>";

updateTotals();

return;

}

cart.forEach((item,i)=>{

const qty=
item.quantity||1;

const total=
item.price*qty;

c.innerHTML+=`

<div class="cart-item">

<div>

<h3>${item.name}</h3>

<p>₱${item.price}</p>

</div>

<div>

<button onclick="decreaseQty(${i})">
-
</button>

<span>${qty}</span>

<button onclick="increaseQty(${i})">
+
</button>

</div>

<div>
₱${total}
</div>

<button onclick="removeItem(${i})">
🗑
</button>

</div>

`;

});

updateTotals();

}

/* TOTAL */

function updateTotals(){

let subtotal=0;

cart.forEach(i=>{

subtotal+=
i.price*
(i.quantity||1);

});

const selectedLocation=
document
.getElementById(
"location"
).value;

const shipping=
selectedLocation
?
getShipping(
selectedLocation
)
:
0;

document.getElementById(
"subtotal"
).textContent=
"₱"+subtotal;

document.getElementById(
"shipping"
).textContent=
"₱"+shipping;

document.getElementById(
"grand-total"
).textContent=
"₱"+(
subtotal+
shipping
);

}

/* ACTIONS */

function increaseQty(i){

cart[i].quantity=
(cart[i].quantity||1)+1;

save();

}

function decreaseQty(i){

cart[i].quantity--;

if(
cart[i].quantity<=0
){

cart.splice(i,1);

}

save();

}

function removeItem(i){

cart.splice(i,1);

save();

}

/* SAVE ORDER */

async function saveOrder(order){

await addDoc(
collection(
db,
"orders"
),
order
);

localStorage.setItem(
"lastOrder",
JSON.stringify(order)
);

localStorage.removeItem(
"cart");

/* THANK YOU */

document.getElementById(
"successModal"
).style.display=
"flex";

setTimeout(()=>{

window.location.href=
"receipt.html";

},2000);

}

/* CHECKOUT */

async function checkout(){

const name=
document
.getElementById(
"customerName"
)
.value
.trim();

const selectedLocation=
document
.getElementById(
"location"
)
.value;

const address=
document
.getElementById(
"customerAddress"
)
.value
.trim();

const phone=
document
.getElementById(
"customerPhone"
)
.value
.trim();

if(
!name||
!selectedLocation||
!address||
!phone
){

alert(
"Complete all fields"
);

return;

}

if(
cart.length===0
){

alert(
"Cart is empty"
);

return;

}

let subtotal=0;

cart.forEach(i=>{

subtotal+=
i.price*
(i.quantity||1);

});

const shipping=
getShipping(
selectedLocation
);

const total=
subtotal+
shipping;

const isCOD=
codAreas.includes(
selectedLocation
);

const order={

id:
"ORD-"+
Date.now(),

name,

location:
selectedLocation,

address,

phone,

items:cart,

subtotal,

shipping,

total_price:
total,

payment_method:
isCOD
?
"COD"
:
"GCash",

status:
isCOD
?
"Pending COD"
:
"Waiting Payment Approval",

timestamp:
new Date()
.toISOString()

};

/* COD */

if(isCOD){

await saveOrder(
order
);

return;

}

/* GCASH */

localStorage.setItem(
"pendingOrder",
JSON.stringify(
order
)
);

window.location.href=
"gcash-payment.html";

}

/* INIT */

document.addEventListener(
"DOMContentLoaded",
()=>{

renderCart();

document
.getElementById(
"location"
)
.addEventListener(
"change",
updateTotals
);

}
);

window.checkout=
checkout;

window.increaseQty=
increaseQty;

window.decreaseQty=
decreaseQty;

window.removeItem=
removeItem;

</script>

</body>
</html>
