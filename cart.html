<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miss A | Crafts and Stuffs</title>

<link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<a href="index.html" class="dashboard-btn">
🏠 Dashboard
</a>

<div class="checkout-container">

<div class="cart-section">

<h1><i>Checkout Cart 🛒</i></h1>

<div id="cart-items"></div>

</div>

<div class="summary-section">

<h2>🧾 Order Summary</h2>

<div class="summary-box">

<div class="row">
<span>Items</span>
<span id="subtotal">₱0</span>
</div>

<div class="row">
<span>Shipping</span>
<span id="shipping">₱0</span>
</div>

<hr>

<div class="row total">
<span>Total</span>
<span id="grand-total">₱0</span>
</div>

</div>

<h2>🧍 Customer Information</h2>

<form id="checkout-form">

<input
type="text"
id="customerName"
placeholder="Full Name"
required>

<select
id="location"
required>

<option value="">
Select Province / Area
</option>

<option value="Mexico, Pampanga">
Mexico, Pampanga
</option>

<option value="Pampanga">
Other Areas in Pampanga
</option>

<option value="Bulacan">
Bulacan
</option>

<option value="Tarlac">
Tarlac
</option>

<option value="Bataan">
Bataan
</option>

<option value="Metro Manila">
Metro Manila
</option>

<option value="Laguna">
Laguna
</option>

<option value="Cavite">
Cavite
</option>

<option value="Others">
Others
</option>

</select>

<input
type="text"
id="customerAddress"
placeholder="House No., Street, Barangay, City"
required>

<input
type="tel"
id="customerPhone"
placeholder="09XXXXXXXXX"
maxlength="11"
required>

<button
type="button"
onclick="checkout()">

Place Order

</button>

</form>

</div>

</div>

<script type="module" src="cart.js"></script>

<script type="module">

/* =====================
FIREBASE
===================== */

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyARANfVLvrWtOpr-oSKm1x5QxnVPLOx3fA",

authDomain:
"missa-crafts-and-stuffs-orders.firebaseapp.com",

projectId:
"missa-crafts-and-stuffs-orders",

storageBucket:
"missa-crafts-and-stuffs-orders.firebasestorage.app",

messagingSenderId:
"307234784231",

appId:
"1:307234784231:web:c332e48e8f76ae35b1b342"

};


const app=
initializeApp(
firebaseConfig
);

const db=
getFirestore(
app
);


/* =====================
SHIPPING
===================== */

function getShipping(location){

switch(location){

case "Mexico, Pampanga":
return 5;

case "Pampanga":
return 10;

case "Bulacan":
return 50;

case "Tarlac":
return 50;

case "Bataan":
return 60;

case "Metro Manila":
return 80;

case "Laguna":
return 100;

case "Cavite":
return 100;

default:
return 150;

}

}


/* =====================
SUMMARY
===================== */

function updateCheckoutTotal(){

let cart=
JSON.parse(
localStorage.getItem(
"cart"
)
)||[];


let subtotal=0;

cart.forEach(item=>{

subtotal+=
Number(item.price||0)*
Number(item.qty||1);

});


const location=
document
.getElementById(
"location"
)
.value;


const shipping=
location
?
getShipping(location)
:
0;


const total=
subtotal+
shipping;


document
.getElementById(
"subtotal"
)
.innerText=
"₱"+subtotal;


document
.getElementById(
"shipping"
)
.innerText=
"₱"+shipping;


document
.getElementById(
"grand-total"
)
.innerText=
"₱"+total;

}


/* =====================
CHECKOUT
===================== */

async function checkout(){

const name=
document
.getElementById(
"customerName"
)
.value
.trim();

const location=
document
.getElementById(
"location"
)
.value;

const address=
document
.getElementById(
"customerAddress"
)
.value
.trim();

const phone=
document
.getElementById(
"customerPhone"
)
.value
.trim();


if(
!name||
!location||
!address||
!phone
){

alert(
"Complete customer information."
);

return;

}


let cart=
JSON.parse(
localStorage.getItem(
"cart"
)
)||[];


if(
cart.length===0
){

alert(
"Your cart is empty!"
);

return;

}


/* TOTAL */

let subtotal=0;

cart.forEach(item=>{

subtotal+=
Number(item.price||0)*
Number(item.qty||1);

});


const shipping=
getShipping(
location
);

const total=
subtotal+
shipping;


/* FIX ITEMS */

const formattedItems=
cart.map(item=>({

product:
item.product||
item.name||
"Unnamed Product",

name:
item.name||
item.product||
"Unnamed Product",

price:
Number(
item.price||0
),

qty:
Number(
item.qty||1
)

}));


const order={

id:
"ORD-"+Date.now(),

type:
"shop",

name,

location,

address,

phone,

items:
formattedItems,

subtotal,

shipping,

total_price:
total,

status:
"Pending",

timestamp:
new Date()
.toLocaleString()

};


try{

await addDoc(

collection(
db,
"orders"
),

order

);


localStorage.removeItem(
"cart"
);


alert(
"Order placed successfully!\nTotal: ₱"+total
);


window.location.href=
"index.html";

}

catch(error){

console.error(
error
);

alert(
"Order failed."
);

}

}


/* =====================
INIT
===================== */

document
.getElementById(
"location"
)
.addEventListener(
"change",
updateCheckoutTotal
);


document
.addEventListener(
"DOMContentLoaded",
updateCheckoutTotal
);


window.checkout=
checkout;

</script>

</body>
</html>
