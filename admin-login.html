<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Miss A | Crafts and Stuffs</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;

      background: linear-gradient(135deg, #eabcbc, #f7d6d6, #c9d6ff);
    }

    /* TILED LOGO BACKGROUND (VISIBLE BUT SUBTLE) */
    body::before {
      content: "";
      position: absolute;
      inset: 0;

      background-image: url("images/logo.png");
      background-repeat: repeat;
      background-size: 140px 140px;

      opacity: 0.18; /* increased visibility */
      filter: none;  /* removed blur so it's clearer */

      z-index: 0;
    }

    .login-box {
      width: 340px;
      padding: 30px;

      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.35);

      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;

      position: relative;
      z-index: 2;
    }

    .logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 5px;
      color: #333;
    }

    .subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;

      border: none;
      outline: none;
      border-radius: 8px;

      background: rgba(255,255,255,0.7);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;

      border: none;
      border-radius: 8px;

      background: #ff8080;
      color: white;
      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      background: #333;
      transform: scale(1.03);
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="login-box">

  <img src="images/logo.png" class="logo" alt="Logo">

  <h2>Miss A | Dashboard</h2>
  <div class="subtitle">Login to access dashboard</div>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p class="error" id="error"></p>
</div>

<script>
function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  if (username === "Miss A" && password === "2023") {
    localStorage.setItem("isAdminLoggedIn", "true");
    window.location.href = "admin.html";
  } else {
    error.textContent = "Invalid username or password!";
  }
}
</script>

</body>
</html>
